<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Someone sent you a whisper 💌</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&family=Playfair+Display:ital@1&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background-color: #4a4542; min-height: 100vh;
    font-family: 'DM Sans', sans-serif; color: #f0ede8;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 40px 20px; position: relative; overflow-x: hidden;
  }
  .ornament { position: fixed; pointer-events: none; opacity: 0.3; }
  .ornament-butterfly { left: -40px; top: 50%; transform: translateY(-60%); width: 180px; }
  .ornament-heart { right: -40px; top: 50%; transform: translateY(-40%); width: 180px; }

  .intro-text { font-family: 'DM Serif Display', serif; font-style: italic; font-size: clamp(13px,2vw,17px); color: rgba(240,237,232,0.55); margin-bottom: 28px; letter-spacing: 0.04em; text-align: center; animation: fadeIn 1.2s ease both; }

  .stamp-flip-wrap { perspective: 1000px; width: clamp(280px,38vw,340px); height: clamp(374px,50vw,454px); cursor: pointer; animation: floatIn 0.9s cubic-bezier(0.2,0,0.2,1) both; }
  @keyframes floatIn { from{opacity:0;transform:translateY(30px) scale(0.95)} to{opacity:1;transform:none} }
  @keyframes fadeIn  { from{opacity:0} to{opacity:1} }

  .stamp-flip-inner { width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.8s cubic-bezier(0.4,0,0.2,1); }
  .stamp-flip-inner.flipped { transform:rotateY(180deg); }
  .stamp-face { position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden; }
  .stamp-back-face { transform:rotateY(180deg); }

  .stamp-perforated {
    width:100%;height:100%;background:#ece9e4;border-radius:6px;
    --s:11px;--c:#4a4542;
    mask: radial-gradient(circle at 50% 0%,var(--c) var(--s),transparent var(--s)) top/22px 22px,
          radial-gradient(circle at 50% 100%,var(--c) var(--s),transparent var(--s)) bottom/22px 22px,
          radial-gradient(circle at 0% 50%,var(--c) var(--s),transparent var(--s)) left/22px 22px,
          radial-gradient(circle at 100% 50%,var(--c) var(--s),transparent var(--s)) right/22px 22px,
          linear-gradient(#fff,#fff);
    mask-repeat:repeat-x,repeat-x,repeat-y,repeat-y,no-repeat;
    mask-composite:exclude,exclude,exclude,exclude,add;
    -webkit-mask: radial-gradient(circle at 50% 0%,var(--c) var(--s),transparent var(--s)) top/22px 22px,
          radial-gradient(circle at 50% 100%,var(--c) var(--s),transparent var(--s)) bottom/22px 22px,
          radial-gradient(circle at 0% 50%,var(--c) var(--s),transparent var(--s)) left/22px 22px,
          radial-gradient(circle at 100% 50%,var(--c) var(--s),transparent var(--s)) right/22px 22px,
          linear-gradient(#fff,#fff);
    -webkit-mask-repeat:repeat-x,repeat-x,repeat-y,repeat-y,no-repeat;
    -webkit-mask-composite:source-out,source-out,source-out,source-out,source-over;
  }

  /* POLAROID face */
  .polaroid-content { width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;background:#ece9e4;gap:12px; }
  .polaroid-song { font-family:'Playfair Display',serif;font-style:italic;font-size:13px;color:#3a3530;text-align:center;max-width:90%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
  .polaroid-tilt { transform:rotate(-6deg); }
  .polaroid-frame-wrap { position:relative;width:clamp(138px,18vw,168px);height:clamp(184px,24vw,224px);flex-shrink:0;background:#000;border-radius:8px;overflow:hidden; }
  .polaroid-frame { position:absolute;inset:0;width:100%;height:100%;object-fit:fill;z-index:2;pointer-events:none; }
  .photo-clip { position:absolute;inset:0;overflow:hidden;z-index:1; }
  .polaroid-photo { position:absolute;width:100%;height:100%;object-fit:cover;object-position:center;display:none; }
  .polaroid-placeholder { position:absolute;inset:0;background:#666; }

  /* LETTER face */
  .letter-content { width:100%;height:100%;display:flex;flex-direction:column;padding:28px 26px 22px;background:#ece9e4; }
  .letter-title { font-family:'DM Serif Display',serif;font-size:clamp(16px,3vw,22px);color:#1a1714;text-decoration:underline;text-underline-offset:5px;margin-bottom:18px;text-align:center;font-style:normal;text-transform:uppercase;letter-spacing:0.05em; }
  .letter-message { flex:1;font-family:'Playfair Display',serif;font-style:italic;font-size:13px;color:#2a2522;line-height:1.8;text-align:center;display:flex;align-items:center;justify-content:center;white-space:pre-wrap;word-break:break-word; }
  .letter-footer { display:flex;justify-content:space-between;align-items:flex-end;margin-top:14px; }
  .letter-from { font-size:12px;color:#5a5250;line-height:1.5; }
  .letter-from span { display:block;font-weight:500;color:#2a2522; }
  .letter-kiss { width:58px;height:42px;object-fit:cover;object-position:center 20%;display:none; }
  .letter-kiss.visible { display:block; }

  .flip-hint { font-size:11px;color:rgba(240,237,232,0.35);margin-top:14px;letter-spacing:0.08em;user-select:none;transition:opacity 0.4s;animation:fadeIn 2s ease both;animation-delay:0.8s; }

  /* music player */
  .music-player { display:none;margin-top:22px;background:rgba(0,0,0,0.28);border-radius:100px;padding:10px 20px;align-items:center;gap:12px;min-width:240px;animation:fadeIn 0.5s ease both; }
  .music-player.visible { display:flex; }
  .music-play-btn { width:32px;height:32px;border-radius:50%;background:#f0ede8;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;flex-shrink:0;transition:transform 0.15s; }
  .music-play-btn:hover { transform:scale(1.08); }
  .music-info { flex:1;overflow:hidden; }
  .music-title-display { font-size:12px;color:#f0ede8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
  .music-sub { font-size:10px;color:rgba(240,237,232,0.5);margin-top:1px;transition:all 0.3s; }
  .music-wave { display:flex;gap:2px;align-items:flex-end;height:16px; }
  .bar { width:3px;background:rgba(240,237,232,0.5);border-radius:2px;height:4px;transition:height 0.15s ease; }
  .bar.playing { animation:wave 1s ease-in-out infinite; }
  .bar:nth-child(1).playing{animation-delay:0s}
  .bar:nth-child(2).playing{animation-delay:0.2s}
  .bar:nth-child(3).playing{animation-delay:0.4s}
  .bar:nth-child(4).playing{animation-delay:0.1s}
  .bar:nth-child(5).playing{animation-delay:0.3s}
  @keyframes wave { 0%,100%{height:3px} 50%{height:15px} }

  /* smooth music player entrance */
  .music-player {
    display:none; margin-top:22px;
    background:rgba(0,0,0,0.28); border-radius:100px;
    padding:10px 20px; align-items:center; gap:12px; min-width:240px;
    opacity:0; transform:translateY(10px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  .music-player.visible { display:flex; }
  .music-player.show { opacity:1; transform:translateY(0); }

  .create-own { margin-top:28px;font-size:12px;color:rgba(240,237,232,0.38);text-decoration:none;letter-spacing:0.04em;transition:color 0.2s;animation:fadeIn 2.5s ease both;animation-delay:1s; }
  .create-own:hover { color:rgba(240,237,232,0.75); }

  @media (max-width:600px) {
    .ornament { display:none; }
    body { padding: 32px 16px; }
    .stamp-flip-wrap { width: clamp(240px, 80vw, 300px); height: clamp(320px, 107vw, 400px); }
    .polaroid-frame-wrap { width: clamp(110px, 30vw, 138px); height: clamp(147px, 40vw, 184px); }
    .music-player { min-width: 0; width: 90vw; padding: 10px 16px; }
  }
  @media (max-width:380px) {
    .stamp-flip-wrap { width: 220px; height: 294px; }
  }
</style>
</head>
<body>

<img src="butterfly.png" class="ornament ornament-butterfly" alt=""/>
<img src="heart.png" class="ornament ornament-heart" alt=""/>

<p class="intro-text">someone is thinking of you ✦</p>

<div class="stamp-flip-wrap" onclick="handleFlip()">
  <div class="stamp-flip-inner" id="card-flipper">

    <!-- FRONT: Polaroid -->
    <div class="stamp-face">
      <div class="stamp-perforated">
        <div class="polaroid-content">
          <div class="polaroid-song" id="card-song"></div>
          <div class="polaroid-tilt">
            <div class="polaroid-frame-wrap">
              <div class="photo-clip">
                <div class="polaroid-placeholder" id="card-photo-placeholder"></div>
                <img src="" class="polaroid-photo" id="card-photo" alt=""/>
              </div>
              <img src="polaroid-grey.png" class="polaroid-frame" id="card-polaroid-frame" alt=""/>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- BACK: Letter -->
    <div class="stamp-face stamp-back-face">
      <div class="stamp-perforated">
        <div class="letter-content">
          <div class="letter-title" id="card-title">TITLE</div>
          <div class="letter-message" id="card-message"></div>
          <div class="letter-footer">
            <div class="letter-from">With love,<br><span id="card-from">Your name</span></div>
            <img src="kiss.png" class="letter-kiss" id="card-kiss" alt=""/>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<p class="flip-hint" id="flip-hint-text">click to flip</p>

<div class="music-player" id="music-player">
  <button class="music-play-btn" onclick="togglePlay(event)" id="play-btn">
    <svg viewBox="0 0 24 24" width="14" height="14" fill="#2a2825"><polygon id="play-icon" points="5,3 19,12 5,21"/></svg>
  </button>
  <div class="music-info">
    <div class="music-title-display" id="music-title-display">—</div>
    <div class="music-sub">tap to play/pause</div>
  </div>
  <div class="music-wave">
    <div class="bar" id="b1"></div><div class="bar" id="b2"></div>
    <div class="bar" id="b3"></div><div class="bar" id="b4"></div>
    <div class="bar" id="b5"></div>
  </div>
</div>

<a href="create.html" class="create-own">create your own whisper →</a>

<!-- Hidden audio for iTunes preview -->
<audio id="preview-audio" preload="none"></audio>

<script>
  let hasFlipped = false;
  let musicStarted = false;
  let isPlaying = false;
  let cardData = {};

  const polaroidFrames = {
    grey:'polaroid-grey.png', pink:'polaroid-pink.png',
    lavender:'polaroid-lavender.png', teal:'polaroid-teal.png',
    navy:'polaroid-navy.png', maroon:'polaroid-maroon.png'
  };

  const SUPA_URL = 'https://wsahegkcmbtlwnxhojun.supabase.co';
  const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndzYWhlZ2tjbWJ0bHdueGhvanVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNDQ0MDIsImV4cCI6MjA5NjkyMDQwMn0.KRwudd80t0GQtOqmXyga_0Sar4LtnTzvockctR4tnGs';

  async function loadCard() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    let data = null;

    if (id) {
      try {
        const res = await fetch(SUPA_URL + '/rest/v1/cards?id=eq.' + id + '&limit=1', {
          headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY }
        });
        const rows = await res.json();
        if (rows && rows[0]) {
          const r = rows[0];
          data = {
            t: r.title, m: r.message, f: r.from_name,
            s: r.sign, c: r.color, p: r.photo_url,
            song: r.song_title ? { title: r.song_title, artist: r.song_artist, art: r.song_art, preview: r.song_preview } : null
          };
        }
      } catch(e) {}
    }

    // fallback legacy encoded
    if (!data) {
      const encoded = params.get('d');
      if (encoded) { try { data = JSON.parse(decodeURIComponent(escape(atob(encoded)))); } catch(e) {} }
    }
    if (!data) {
      const key = params.get('k');
      if (key) { try { data = JSON.parse(sessionStorage.getItem(key)); } catch(e) {} }
    }
    if (!data) {
      data = { t:'For you', m:'semangat yaa,\njangan lupa makan hari ini', f:'Your beloved sister', s:'none', c:'grey', p:null, song:null };
    }

    cardData = data;
    document.getElementById('card-title').textContent  = (data.t || 'TITLE').toUpperCase();
    document.getElementById('card-message').innerHTML  = (data.m || '').replace(/\n/g,'<br>');
    document.getElementById('card-from').textContent   = data.f || 'Your name';
    document.getElementById('card-polaroid-frame').src = polaroidFrames[data.c] || polaroidFrames.grey;

    if (data.s === 'kiss') document.getElementById('card-kiss').classList.add('visible');

    if (data.p) {
      const photo = document.getElementById('card-photo');
      // Handle both Supabase URL and base64 fallback
      if (data.p.startsWith('data:')) {
        photo.src = data.p;
      } else {
        photo.crossOrigin = 'anonymous';
        photo.src = data.p;
      }
      photo.style.display = 'block';
      document.getElementById('card-photo-placeholder').style.display = 'none';
    }

    if (data.song) {
      document.getElementById('card-song').textContent = data.song.title || '';
      document.getElementById('music-title-display').textContent = (data.song.title || '') + (data.song.artist ? ' · ' + data.song.artist : '');
      if (data.song.preview) {
        document.getElementById('preview-audio').src = data.song.preview;
      }
    }
  }

  function handleFlip() {
    const flipper = document.getElementById('card-flipper');
    const isNowFlipped = flipper.classList.toggle('flipped');

    if (!hasFlipped && isNowFlipped) {
      // First flip ke letter — trigger musik
      hasFlipped = true;
      document.getElementById('flip-hint-text').style.opacity = '0';

      if (cardData.song && cardData.song.preview) {
        setTimeout(() => {
          const player = document.getElementById('music-player');
          player.classList.add('visible');
          requestAnimationFrame(() => {
            requestAnimationFrame(() => { player.classList.add('show'); });
          });
          const audio = document.getElementById('preview-audio');
          audio.play()
            .then(() => { isPlaying = true; updatePlayBtn(); })
            .catch(() => {
              isPlaying = false; updatePlayBtn();
              document.querySelector('.music-sub').textContent = 'tap ▶ to play';
            });
        }, 850);
      }
    } else {
      // Flip bebas bolak-balik
      const hint = document.getElementById('flip-hint-text');
      hint.textContent = isNowFlipped ? 'click to see polaroid ↺' : 'click to see letter ↺';
      hint.style.opacity = '0.4';
      setTimeout(() => { hint.style.opacity = '0'; }, 1800);
    }
  }

  function playAudio() {
    const audio = document.getElementById('preview-audio');
    audio.play().then(() => { isPlaying = true; updatePlayBtn(); }).catch(() => {
      const sub = document.querySelector('.music-sub');
      if (sub) sub.textContent = 'tap ▶ to play';
    });
  }

  function togglePlay(e) {
    e.stopPropagation();
    const audio = document.getElementById('preview-audio');
    if (isPlaying) { audio.pause(); isPlaying = false; }
    else { audio.play(); isPlaying = true; }
    updatePlayBtn();
  }

  function updatePlayBtn() {
    document.getElementById('play-icon').setAttribute('points', isPlaying ? '6,4 10,4 10,20 6,20 M14,4 18,4 18,20 14,20' : '5,3 19,12 5,21');
    [1,2,3,4,5].forEach(i => document.getElementById('b'+i).classList.toggle('playing', isPlaying));
  }

  document.getElementById('preview-audio').addEventListener('ended', () => { isPlaying = false; updatePlayBtn(); });

  loadCard();
</script>
</body>
</html>
